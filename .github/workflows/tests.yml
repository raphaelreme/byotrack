name: Lint and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"
  workflow_call: # Triggerable from other workflows
  workflow_dispatch: # Triggerable manually
  schedule:
    - cron:  '45 10 * * 2'  # Run weekly tests with latest dependencies on Tuesday at 10:45

jobs:
  main:
    if: github.event_name != 'schedule'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Set git to use LF
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
      - uses: actions/checkout@v6
      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install the project
        run: uv sync --locked --all-extras --dev
      - name: Linting (ruff)
        run: uv run ruff check
      - name: Type checking (mypy)
        run: uv run mypy .
      - name: prek
        uses: j178/prek-action@v1
        with:
          extra_args: --all-files --skip ruff-check --skip ruff-format
      - name: Format checking (ruff)
        run: uv run ruff format --check
      - name: pytest (with numba)
        run: uv run pytest tests
      - name: pytest (coverage, numba disabled)
        run: uv run pytest tests --cov --cov-branch --cov-report xml
        env:
          NUMBA_DISABLE_JIT: 1
      - name: Upload results to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  latest:
    runs-on: ubuntu-latest

    steps:
      - name: Set git to use LF
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
      - uses: actions/checkout@v6
      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      - name: Install the project (latest dependencies)
        run: uv sync --upgrade --all-extras --dev
      - name: pytest
        run: uv run pytest tests
